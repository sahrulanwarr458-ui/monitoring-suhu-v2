<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Smart Incubator Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>🐣 SMART INCUBATOR PRO</h1>

<!-- SUHU -->
<div class="card">
    <div id="tempValue" class="temp-display">-- °C</div>
</div>

<!-- REALTIME -->
<div class="card">
    <canvas id="tempChart"></canvas>
</div>

<!-- HISTORY -->
<div class="card history">
    <canvas id="historyChart"></canvas>
</div>

<!-- STATUS -->
<div class="grid">

<div class="card">
    <h3>Lampu</h3>
    <div id="lampu" class="status-badge off">OFF</div>
</div>

<div class="card">
    <h3>Kipas</h3>
    <div id="kipas" class="status-badge off">OFF</div>
</div>

<div class="card">
    <h3>LOW</h3>
    <div id="lowVal">--</div>
</div>

<div class="card">
    <h3>HIGH</h3>
    <div id="highVal">--</div>
</div>

</div>

<!-- MODE -->
<div class="card">
    <h3>Mode</h3>
    <div class="mode-toggle">
        <button id="autoBtn" onclick="setMode('AUTO')">AUTO</button>
        <button id="manualBtn" onclick="setMode('MANUAL')">MANUAL</button>
    </div>
    <div id="modeStatus">Mode: --</div>
</div>

<!-- MANUAL CONTROL -->
<div class="card">
    <h3>Kontrol Manual</h3>

    <button onclick="kontrolLampu('ON')">Lampu ON</button>
    <button onclick="kontrolLampu('OFF')">Lampu OFF</button>

    <br>

    <button onclick="kontrolKipas('ON')">Kipas ON</button>
    <button onclick="kontrolKipas('OFF')">Kipas OFF</button>
</div>

<!-- SETPOINT -->
<div class="card">
    <h3>Set Suhu</h3>

    <input id="setLow" type="number" placeholder="Set LOW">
    <button onclick="kirimLow()">Kirim LOW</button>

    <input id="setHigh" type="number" placeholder="Set HIGH">
    <button onclick="kirimHigh()">Kirim HIGH</button>
</div>

<div id="status">Connecting...</div>

</div>

<script src="app.js"></script>
</body>
</html>
