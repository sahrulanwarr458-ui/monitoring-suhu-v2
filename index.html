<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Smart Incubator</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>SMART INCUBATOR</h1>

<p id="currentTime"></p>
<p>Status: <span id="modeStatus">AUTO</span></p>

<button id="autoModeBtn">AUTO</button>
<button id="manualModeBtn">MANUAL</button>

<h2>Suhu: <span id="currentTemp">--</span> °C</h2>

<canvas id="tempChart"></canvas>

<h3>Lampu</h3>
<div id="lampu" class="status-badge off">OFF</div>

<h3>Motor Goyang Telur</h3>
<div id="motor" class="status-badge off">OFF</div>
<p style="color:orange;">Auto tiap 2 jam</p>

<h3>Setpoint</h3>
LOW: <span id="lowVal">--</span><br>
HIGH: <span id="highVal">--</span>

<div id="manualPanel" style="display:none;">
    <h3>Manual</h3>
    <button id="lampOnBtn">Lamp ON</button>
    <button id="lampOffBtn">Lamp OFF</button>
    <p>Motor otomatis</p>
</div>

<p>Client ID: <span id="clientId"></span></p>

<script src="app.js"></script>
</body>
</html>
