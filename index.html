<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Incubator Pro Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🥚 SMART INCUBATOR</h1>
        <div id="currentTime"></div>
        <div id="connectionStatus" class="connection-badge offline">OFFLINE</div>
    </div>

    <div class="card">
        <button id="autoModeBtn">AUTO</button>
        <button id="manualModeBtn">MANUAL</button>
        Mode: <span id="modeStatus">AUTO</span>
    </div>

    <div class="card">
        <h2>Suhu: <span id="currentTemp">--</span> °C</h2>
        <canvas id="tempChart"></canvas>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Lampu</h3>
            <div id="lampu" class="status-badge off">OFF</div>
        </div>

        <div class="card">
            <h3>Motor (Auto)</h3>
            <div id="kipas" class="status-badge off">OFF</div>
            <small>Berjalan tiap 2 jam</small>
        </div>

        <div class="card">
            LOW: <span id="lowVal">--</span>
        </div>

        <div class="card">
            HIGH: <span id="highVal">--</span>
        </div>
    </div>

    <div id="manualPanel" class="card" style="display:none;">
        <button id="lampOnBtn">Lamp ON</button>
        <button id="lampOffBtn">Lamp OFF</button>

        <button disabled>AUTO MOTOR</button>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
